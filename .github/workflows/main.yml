# ══════════════════════════════════════════════════════════════════════════════
# 골핑 마켓 신규 상품 알림 — GitHub Actions 워크플로우
# ══════════════════════════════════════════════════════════════════════════════
#
# ┌─ CRON 시간 계산 (UTC 기준) ──────────────────────────────────────────────┐
# │  KST(한국표준시) = UTC + 9시간                                           │
# │                                                                           │
# │  원하는 실행 시간 (KST) → GitHub Actions cron (UTC)                      │
# │  KST 11:00 ~ 20:00        →   UTC 02:00 ~ 11:00                         │
# │                                                                           │
# │  cron 식: "*/10 2-10 * * *"                                              │
# │    • */10  → 매 10분마다                                                 │
# │    • 2-10  → UTC 02시~10시 (= KST 11시~19시)                            │
# │    • * * * → 매일, 매월, 요일 무관                                       │
# │                                                                           │
# │  ※ UTC 11:00(=KST 20:00) 실행은 Python의 시간 방어 로직(< 20시)으로    │
# │    차단되므로, cron 상한을 10으로 설정해도 무방합니다.                  │
# │    만약 UTC 11:00 실행도 허용하려면 "2-11"로 변경하세요.                │
# └───────────────────────────────────────────────────────────────────────────┘

name: 골핑 신규 상품 알림

on:
  schedule:
    # KST 11:00~19:50까지 매 10분 실행 (UTC 02:00~10:50)
    # Python 코드 내부의 시간 방어 로직이 최종 실행 여부를 결정합니다.
    - cron: "*/10 2-10 * * *"

  # 수동 실행 버튼 — Actions 탭에서 직접 테스트할 때 사용
  workflow_dispatch:

# ── 저장소 쓰기 권한 (last_product.txt 커밋/푸시용) ──────────────────────
permissions:
  contents: write

jobs:
  check-and-notify:
    name: 신규 상품 확인 및 알림 발송
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: 저장소 체크아웃 ───────────────────────────────────────────
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          # last_product.txt 커밋을 위해 GitHub Actions 봇 토큰 사용
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Python 환경 설정 ─────────────────────────────────────────
      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 의존성 캐싱으로 실행 속도 향상

      # ── Step 3: 의존성 설치 ──────────────────────────────────────────────
      - name: 📦 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

          # ※ Selenium이 필요한 경우(동적 렌더링 사이트) 아래 주석 해제:
          # pip install selenium webdriver-manager

      # ── Step 4: 스크래핑 스크립트 실행 ──────────────────────────────────
      - name: 🔍 신규 상품 확인 실행
        env:
          # GitHub Secrets에 등록한 값을 환경 변수로 전달
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python main.py

      # ── Step 5: last_product.txt 변경 시 저장소에 커밋/푸시 ─────────────
      - name: 💾 상품 상태 파일 저장 (변경 시에만 커밋)
        run: |
          # Git 사용자 설정 (GitHub Actions 봇으로 커밋)
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # last_product.txt가 변경되었을 때만 커밋
          if git diff --quiet last_product.txt 2>/dev/null && git ls-files --error-unmatch last_product.txt 2>/dev/null; then
            echo "변경 없음 — 커밋 생략"
          else
            git add last_product.txt
            git commit -m "chore: update last_product.txt [skip ci]" || echo "커밋할 변경사항 없음"
            git push origin HEAD:${{ github.ref_name }} || echo "푸시할 변경사항 없음"
          fi
