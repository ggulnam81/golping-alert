name: 골핑 신규 상품 알림

# ──────────────────────────────────────────────────────────
# CRON 시간 계산 (UTC 기준)
#   KST = UTC + 9시간
#   KST 11:00~20:00  →  UTC 02:00~11:00
#   cron "*/10 2-10 * * *" = UTC 02:00~10:50, 10분 간격
#   (Python 코드 내 시간 방어 로직이 최종 실행 여부 결정)
# ──────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "*/10 2-10 * * *"
  workflow_dispatch:   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write      # last_product.txt 커밋·푸시 권한

jobs:
  check-and-notify:
    name: 신규 상품 확인 및 알림 발송
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: 저장소 체크아웃 ──────────────────────────
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      # ── Step 2: Python 환경 설정 ─────────────────────────
      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 3: 의존성 설치 ──────────────────────────────
      - name: 📦 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── Step 4: 스크래핑 스크립트 실행 ──────────────────
      - name: 🔍 신규 상품 확인 실행
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          FORCE_EMAIL: "true"

        run: python main.py

      # ── Step 5: last_product.txt 변경 시 저장소에 커밋/푸시
      - name: 💾 상품 상태 파일 저장
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 파일이 존재할 때만 커밋 시도
          if [ ! -f last_product.txt ]; then
            echo "last_product.txt 없음 — 커밋 생략"
            exit 0
          fi

          git add last_product.txt

          # staged 변경이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: update last_product.txt [skip ci]"
            git push origin HEAD
            echo "✅ last_product.txt 저장 완료"
          fi
